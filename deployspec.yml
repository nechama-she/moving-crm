version: 0.2

# DEPLOY STAGE — runs after Infrastructure, uses BuildOutput artifact
phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing backend dependencies for migrations"
      - cd $CODEBUILD_SRC_DIR/backend && pip install -r requirements.txt

  pre_build:
    commands:
      - echo "Ensuring tables exist (safe — no data loss)"
      - cd $CODEBUILD_SRC_DIR/backend && python migrate.py
      - echo "Adding new columns to leads table"
      - cd $CODEBUILD_SRC_DIR/backend && python -c "
        from database import engine;
        from sqlalchemy import text;
        conn = engine.connect();
        [conn.execute(text(f'ALTER TABLE leads ADD COLUMN IF NOT EXISTS {c[0]} {c[1]}')) or conn.commit() for c in [('referral_source','VARCHAR(100)'),('service_type','VARCHAR(50)')]];
        conn.close();
        print('Done')
        "
      - echo "Generating API secret if not exists"
      - |
        SSM_KEY="/moving-crm/${ENVIRONMENT:-dev}/API_SECRET"
        if ! aws ssm get-parameter --name "$SSM_KEY" --with-decryption > /dev/null 2>&1; then
          SECRET=$(python -c "import secrets; print(secrets.token_urlsafe(32))")
          aws ssm put-parameter --name "$SSM_KEY" --value "$SECRET" --type SecureString --overwrite
          echo "API_SECRET generated and stored in SSM"
        else
          echo "API_SECRET already exists in SSM"
        fi
      - echo "Ensuring admin user + importing new leads (skips existing)"
      - cd $CODEBUILD_SRC_DIR/backend && python import_leads.py --commit

  build:
    commands:
      - echo "Updating lead-followup Lambda function code"
      - aws lambda update-function-code --function-name moving-crm-lead-followup-${ENVIRONMENT:-dev} --s3-bucket ${FRONTEND_BUCKET} --s3-key lead-followup/package.zip

      - echo "Updating API backend Lambda function code"
      - aws lambda update-function-code --function-name moving-crm-api-${ENVIRONMENT:-dev} --s3-bucket ${FRONTEND_BUCKET} --s3-key api-backend/package.zip

      - echo "Deploying frontend to S3"
      - aws s3 sync $CODEBUILD_SRC_DIR/frontend/dist/ s3://${FRONTEND_BUCKET}/ --delete --exclude "lead-followup/*" --exclude "api-backend/*"

      - echo "Injecting API Gateway URL into frontend config"
      - API_URL=$(aws cloudformation describe-stacks --stack-name moving-crm-${ENVIRONMENT:-dev} --query "Stacks[0].Outputs[?OutputKey=='ApiURL'].OutputValue" --output text)
      - echo "window.__API_URL__ = '${API_URL}';" > /tmp/api-config.js
      - aws s3 cp /tmp/api-config.js s3://${FRONTEND_BUCKET}/api-config.js

      - echo "CloudFront invalidation skipped — distribution not yet deployed"
      # - DIST_ID=$(aws cloudformation describe-stacks --stack-name moving-crm-${ENVIRONMENT:-dev} --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" --output text)
      # - aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"

  post_build:
    commands:
      - echo "Deploy complete"
