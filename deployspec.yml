version: 0.2

# DEPLOY STAGE — runs after Infrastructure, uses BuildOutput artifact
phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing backend dependencies"
      - cd $CODEBUILD_SRC_DIR/backend && pip install -r requirements.txt

  pre_build:
    commands:
      - echo "Recreating tables with latest schema"
      - cd $CODEBUILD_SRC_DIR/backend && python migrate.py --drop
      - echo "Importing 20 most recent leads from DynamoDB"
      - cd $CODEBUILD_SRC_DIR/backend && python import_leads.py --commit --limit 20

  build:
    commands:
      - echo "Updating Lambda function code"
      - aws lambda update-function-code --function-name moving-crm-lead-followup-${ENVIRONMENT:-dev} --s3-bucket ${FRONTEND_BUCKET} --s3-key lead-followup/package.zip

      - echo "Deploying frontend to S3"
      - aws s3 sync $CODEBUILD_SRC_DIR/frontend/dist/ s3://${FRONTEND_BUCKET}/ --delete --exclude "lead-followup/*"

  post_build:
    commands:
      - echo "Deploy complete"
