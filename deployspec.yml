version: 0.2

# DEPLOY STAGE — runs after Infrastructure, uses BuildOutput artifact
phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing backend dependencies for migrations"
      - cd $CODEBUILD_SRC_DIR/backend && pip install -r requirements.txt --quiet

  pre_build:
    commands:
      - echo "Running database migrations"
      - cd $CODEBUILD_SRC_DIR/backend && python migrate.py
      - cd $CODEBUILD_SRC_DIR/backend && python add_columns.py
      - echo "Ensuring seed data (admin user + company)"
      - cd $CODEBUILD_SRC_DIR/backend && python -c "from import_leads import ensure_seed_data; from database import SessionLocal; s=SessionLocal(); ensure_seed_data(s); s.commit(); s.close(); print('Seed data OK')"
      - |
        SSM_KEY="/moving-crm/${ENVIRONMENT:-dev}/API_SECRET"
        if ! aws ssm get-parameter --name "$SSM_KEY" --with-decryption > /dev/null 2>&1; then
          SECRET=$(python -c "import secrets; print(secrets.token_urlsafe(32))")
          aws ssm put-parameter --name "$SSM_KEY" --value "$SECRET" --type SecureString --overwrite
          echo "API_SECRET generated and stored in SSM"
        else
          echo "API_SECRET already exists in SSM"
        fi

  build:
    commands:
      - echo "Updating lead-followup Lambda function code"
      - aws lambda update-function-code --function-name moving-crm-lead-followup-${ENVIRONMENT:-dev} --s3-bucket ${FRONTEND_BUCKET} --s3-key lead-followup/package.zip

      - echo "Updating lead-duplicate Lambda function code"
      - aws lambda update-function-code --function-name moving-crm-lead-duplicate-${ENVIRONMENT:-dev} --s3-bucket ${FRONTEND_BUCKET} --s3-key lead-duplicate/package.zip

      - echo "Updating API backend Lambda function code"
      - aws lambda update-function-code --function-name moving-crm-api-${ENVIRONMENT:-dev} --s3-bucket ${FRONTEND_BUCKET} --s3-key api-backend/package.zip

      - echo "Deploying frontend to S3"
      - aws s3 sync $CODEBUILD_SRC_DIR/frontend/dist/ s3://${FRONTEND_BUCKET}/ --delete --exclude "lead-followup/*" --exclude "api-backend/*" --exclude "lead-duplicate/*"

      - echo "Injecting API Gateway URL into frontend config"
      - API_URL=$(aws cloudformation describe-stacks --stack-name moving-crm-${ENVIRONMENT:-dev} --query "Stacks[0].Outputs[?OutputKey=='ApiURL'].OutputValue" --output text)
      - echo "window.__API_URL__ = '${API_URL}';" > /tmp/api-config.js
      - aws s3 cp /tmp/api-config.js s3://${FRONTEND_BUCKET}/api-config.js

      - echo "Deploying dispatch-frontend to its own S3 bucket"
      - aws s3 sync $CODEBUILD_SRC_DIR/dispatch-frontend/dist/ s3://${DISPATCH_BUCKET}/ --delete

      - echo "Injecting dispatch backend URL into dispatch config"
      - DISPATCH_API_URL=$(aws cloudformation describe-stacks --stack-name moving-crm-${ENVIRONMENT:-dev} --query "Stacks[0].Outputs[?OutputKey=='DispatchApiURL'].OutputValue" --output text)
      - if [ -z "$DISPATCH_API_URL" ] || [ "$DISPATCH_API_URL" = "None" ]; then echo "DispatchApiURL not yet available (DeployDispatchApi=false). Skipping dispatch api-config.js."; else echo "window.__DISPATCH_API_BASE__ = '${DISPATCH_API_URL}';" > /tmp/dispatch-api-config.js && aws s3 cp /tmp/dispatch-api-config.js s3://${DISPATCH_BUCKET}/api-config.js; fi

      - echo "Invalidating CloudFront cache (frontend)"
      - DIST_ID=$(aws cloudformation describe-stacks --stack-name moving-crm-${ENVIRONMENT:-dev} --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" --output text)
      - aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"

      - echo "Invalidating CloudFront cache (dispatch)"
      - DISPATCH_DIST_ID=$(aws cloudformation describe-stacks --stack-name moving-crm-${ENVIRONMENT:-dev} --query "Stacks[0].Outputs[?OutputKey=='DispatchDistributionId'].OutputValue" --output text)
      - aws cloudfront create-invalidation --distribution-id $DISPATCH_DIST_ID --paths "/*"

  post_build:
    commands:
      - echo "Deploy complete"

cache:
  paths:
    - '/root/.cache/pip/**/*'
