AWSTemplateFormatVersion: "2010-09-09"
Description: Moving CRM — Full stack (VPC, RDS, S3, CodePipeline, CodeBuild)

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  DBInstanceClass:
    Type: String
    Default: db.t3.micro

  DBName:
    Type: String
    Default: moving_crm

  DBMasterUsername:
    Type: String
    Default: crm_admin
    NoEcho: true

  DBMasterPassword:
    Type: String
    NoEcho: true
    MinLength: 8

  AllowedCIDR:
    Type: String
    Description: Your IP in CIDR notation (e.g. 1.2.3.4/32) for dev access
    Default: "0.0.0.0/0"

  GitHubConnectionArn:
    Type: String
    Description: ARN of the CodeStar Connection to GitHub (create in Console → Developer Tools → Connections)

  GitHubRepo:
    Type: String
    Default: nechama-she/moving-crm
    Description: GitHub owner/repo

  GitHubBranch:
    Type: String
    Default: main

Resources:
  # ===========================================================================
  # NETWORKING
  # ===========================================================================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub moving-crm-${Environment}

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub moving-crm-public-a-${Environment}

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub moving-crm-public-b-${Environment}

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  SubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  # ===========================================================================
  # SECURITY GROUPS
  # ===========================================================================
  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow PostgreSQL access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: !Ref AllowedCIDR
          Description: PostgreSQL from allowed IP

  # CodeBuild connects to RDS via public endpoint (no VPC config needed, saves NAT Gateway cost)

  # ===========================================================================
  # RDS POSTGRESQL
  # ===========================================================================
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Moving CRM subnets
      SubnetIds:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB

  Database:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub moving-crm-${Environment}
      Engine: postgres
      EngineVersion: "17.2"
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: 20
      StorageType: gp3
      DBName: !Ref DBName
      MasterUsername: !Ref DBMasterUsername
      MasterUserPassword: !Ref DBMasterPassword
      PubliclyAccessible: true
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt DBSecurityGroup.GroupId
      BackupRetentionPeriod: 7
      MultiAZ: false
      StorageEncrypted: true
      Tags:
        - Key: Name
          Value: !Sub moving-crm-${Environment}

  # ===========================================================================
  # SSM PARAMETERS — DB connection info for the app + CodeBuild
  # ===========================================================================
  SSMDBHost:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /moving-crm/${Environment}/DB_HOST
      Type: String
      Value: !GetAtt Database.Endpoint.Address

  SSMDBPort:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /moving-crm/${Environment}/DB_PORT
      Type: String
      Value: !GetAtt Database.Endpoint.Port

  SSMDBName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /moving-crm/${Environment}/DB_NAME
      Type: String
      Value: !Ref DBName

  SSMDBUser:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /moving-crm/${Environment}/DB_USER
      Type: String
      Value: !Ref DBMasterUsername

  SSMDBPassword:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /moving-crm/${Environment}/DB_PASSWORD
      Type: String
      Value: !Ref DBMasterPassword

  # ===========================================================================
  # S3 — Frontend hosting + Pipeline artifacts
  # ===========================================================================
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub moving-crm-frontend-${Environment}-${AWS::AccountId}
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicRead
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"

  # ===========================================================================
  # IAM — CodeBuild role
  # ===========================================================================
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub moving-crm-codebuild-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # CloudWatch Logs
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*"
              # Frontend bucket (deploy built files)
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt FrontendBucket.Arn
                  - !Sub "${FrontendBucket.Arn}/*"
              # SSM (read DB config)
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/moving-crm/${Environment}/*"
              # DynamoDB (read leads for import)
              - Effect: Allow
                Action:
                  - dynamodb:Scan
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/leads"
              # CodeStar connection (pull source + report build status)
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: !Ref GitHubConnectionArn

  # ===========================================================================
  # CODEBUILD — Source credential (links CodeStar connection to CodeBuild)
  # ===========================================================================
  CodeBuildSourceCredential:
    Type: AWS::CodeBuild::SourceCredential
    Properties:
      AuthType: CODECONNECTIONS
      ServerType: GITHUB
      Token: !Ref GitHubConnectionArn

  # ===========================================================================
  # CODEBUILD — Triggered by webhook, reports status back to repo
  # ===========================================================================
  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    DependsOn: CodeBuildSourceCredential
    Properties:
      Name: !Sub moving-crm-${Environment}
      Description: Build + deploy Moving CRM
      ServiceRole: !GetAtt CodeBuildRole.Arn
      TimeoutInMinutes: 15
      Source:
        Type: GITHUB
        Location: !Sub "https://github.com/${GitHubRepo}.git"
        BuildSpec: buildspec.yml
        ReportBuildStatus: true
      SourceVersion: !Ref GitHubBranch
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        EnvironmentVariables:
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: SSM_PREFIX
            Value: !Sub /moving-crm/${Environment}/
          - Name: AWS_REGION
            Value: !Ref AWS::Region
          - Name: FRONTEND_BUCKET
            Value: !Ref FrontendBucket
          - Name: DYNAMO_TABLE_NAME
            Value: leads
      Triggers:
        Webhook: true
        FilterGroups:
          - - Type: EVENT
              Pattern: PUSH
            - Type: HEAD_REF
              Pattern: !Sub "^refs/heads/${GitHubBranch}$"

Outputs:
  FrontendURL:
    Description: Frontend website URL
    Value: !GetAtt FrontendBucket.WebsiteURL

  FrontendBucketName:
    Description: S3 bucket for frontend
    Value: !Ref FrontendBucket

  DBEndpoint:
    Description: RDS PostgreSQL endpoint
    Value: !GetAtt Database.Endpoint.Address

  DBPort:
    Description: RDS PostgreSQL port
    Value: !GetAtt Database.Endpoint.Port

  CodeBuildProject:
    Description: CodeBuild project name
    Value: !Ref CodeBuildProject

  VPCId:
    Description: VPC ID
    Value: !Ref VPC
