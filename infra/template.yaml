AWSTemplateFormatVersion: "2010-09-09"
Description: Moving CRM — Full stack (VPC, RDS, S3, CodePipeline, CodeBuild)

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  DBInstanceClass:
    Type: String
    Default: db.t3.micro

  DBName:
    Type: String
    Default: moving_crm

  DBMasterUsername:
    Type: String
    Default: crm_admin
    NoEcho: true

  AllowedCIDR:
    Type: String
    Description: Your IP in CIDR notation (e.g. 1.2.3.4/32) for dev access
    Default: "0.0.0.0/0"

  GitHubConnectionArn:
    Type: String
    Description: ARN of the CodeStar Connection to GitHub (create in Console → Developer Tools → Connections)

  GitHubRepo:
    Type: String
    Default: nechama-she/moving-crm
    Description: GitHub owner/repo

  GitHubBranch:
    Type: String
    Default: main

  SmartMovingApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: SmartMoving API key — supply via parameter override; rotate the previously committed value

  DomainName:
    Type: String
    Default: ""
    Description: Custom frontend domain (e.g. crm.example.com). Empty = CloudFront default domain only.

  HostedZoneId:
    Type: String
    Default: ""
    Description: Route 53 hosted zone ID for DomainName (required when DomainName is set).

  GoogleSheetId:
    Type: String
    Default: ""
    Description: Google Sheet ID used for day-3 lead exports

  DeployLambda:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Set to false for initial bootstrap (Lambda zip not yet in S3)

Conditions:
  ShouldDeployLambda: !Equals [!Ref DeployLambda, "true"]
  IsProd: !Equals [!Ref Environment, "prod"]
  IsDev: !Not [!Equals [!Ref Environment, "prod"]]
  HasDomain: !Not [!Equals [!Ref DomainName, ""]]

Resources:
  # ===========================================================================
  # NETWORKING
  # ===========================================================================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub moving-crm-${Environment}

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub moving-crm-public-a-${Environment}

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub moving-crm-public-b-${Environment}

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  SubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  # --- Private subnets (RDS + in-VPC Lambda live here in prod) ---
  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub moving-crm-private-a-${Environment}

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.12.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub moving-crm-private-b-${Environment}

  # --- NAT for private-subnet egress (prod only) ---
  NatEip:
    Type: AWS::EC2::EIP
    Condition: IsProd
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Condition: IsProd
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags:
        - Key: Name
          Value: !Sub moving-crm-nat-${Environment}

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Condition: IsProd
    Properties:
      VpcId: !Ref VPC

  PrivateRoute:
    Type: AWS::EC2::Route
    Condition: IsProd
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: IsProd
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: IsProd
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTable

  # ===========================================================================
  # SECURITY GROUPS
  # ===========================================================================
  # Compute (Lambda + in-VPC CodeBuild) security group
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Moving CRM compute (Lambda / CodeBuild) security group
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound
  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow PostgreSQL access
      VpcId: !Ref VPC

  # Dev keeps the IP-allowlist ingress; prod allows only the Lambda + RDS Proxy SGs.
  DBIngressDevCidr:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: IsDev
    Properties:
      GroupId: !Ref DBSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      CidrIp: !Ref AllowedCIDR
      Description: PostgreSQL from allowed IP (dev)

  DBIngressLambda:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: IsProd
    Properties:
      GroupId: !Ref DBSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref LambdaSecurityGroup
      Description: PostgreSQL from compute SG (prod)

  DBIngressProxy:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: IsProd
    Properties:
      GroupId: !Ref DBSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref RDSProxySecurityGroup
      Description: PostgreSQL from RDS Proxy SG (prod)

  # CodeBuild connects to RDS via public endpoint (no VPC config needed, saves NAT Gateway cost)

  # ===========================================================================
  # RDS POSTGRESQL
  # ===========================================================================
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Moving CRM subnets
      SubnetIds: !If
        - IsProd
        - [!Ref PrivateSubnetA, !Ref PrivateSubnetB]
        - [!Ref PublicSubnetA, !Ref PublicSubnetB]

  Database:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub moving-crm-${Environment}
      Engine: postgres
      EngineVersion: !If [IsProd, "17.10", "17.2"]
      DBInstanceClass: !If [IsProd, db.t4g.small, !Ref DBInstanceClass]
      AllocatedStorage: 20
      StorageType: gp3
      DBName: !Ref DBName
      MasterUsername: !Ref DBMasterUsername
      ManageMasterUserPassword: true
      PubliclyAccessible: !If [IsProd, false, true]
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt DBSecurityGroup.GroupId
      BackupRetentionPeriod: !If [IsProd, 14, 7]
      MultiAZ: !If [IsProd, true, false]
      DeletionProtection: !If [IsProd, true, false]
      StorageEncrypted: true
      Tags:
        - Key: Name
          Value: !Sub moving-crm-${Environment}

  # ===========================================================================
  # RDS PROXY (prod — pooled connections for in-VPC Lambda)
  # ===========================================================================
  RDSProxySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: IsProd
    Properties:
      GroupDescription: Moving CRM RDS Proxy security group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
          Description: From compute SG
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound

  RDSProxyRole:
    Type: AWS::IAM::Role
    Condition: IsProd
    Properties:
      RoleName: !Sub moving-crm-rds-proxy-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: rds.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GetDbSecret
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !GetAtt Database.MasterUserSecret.SecretArn

  RDSProxy:
    Type: AWS::RDS::DBProxy
    Condition: IsProd
    Properties:
      DBProxyName: !Sub moving-crm-${Environment}
      EngineFamily: POSTGRESQL
      RoleArn: !GetAtt RDSProxyRole.Arn
      RequireTLS: true
      Auth:
        - AuthScheme: SECRETS
          IAMAuth: DISABLED
          SecretArn: !GetAtt Database.MasterUserSecret.SecretArn
      VpcSubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      VpcSecurityGroupIds:
        - !Ref RDSProxySecurityGroup

  RDSProxyTargetGroup:
    Type: AWS::RDS::DBProxyTargetGroup
    Condition: IsProd
    Properties:
      DBProxyName: !Ref RDSProxy
      TargetGroupName: default
      DBInstanceIdentifiers:
        - !Ref Database

  # ===========================================================================
  # SSM PARAMETERS — DB connection info for the app + CodeBuild
  # ===========================================================================
  SSMDBHost:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /moving-crm/${Environment}/DB_HOST
      Type: String
      Value: !If [IsProd, !GetAtt RDSProxy.Endpoint, !GetAtt Database.Endpoint.Address]

  SSMDBPort:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /moving-crm/${Environment}/DB_PORT
      Type: String
      Value: !GetAtt Database.Endpoint.Port

  SSMDBName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /moving-crm/${Environment}/DB_NAME
      Type: String
      Value: !Ref DBName

  SSMDBUser:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /moving-crm/${Environment}/DB_USER
      Type: String
      Value: !Ref DBMasterUsername

  SSMDBPassword:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /moving-crm/${Environment}/DB_PASSWORD
      Type: String
      Value: !Sub
        - "{{resolve:secretsmanager:${SecretArn}:SecretString:password}}"
        - SecretArn: !GetAtt Database.MasterUserSecret.SecretArn

  SSMSmartMovingApiKey:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /moving-crm/${Environment}/SMARTMOVING_API_KEY
      Type: String
      Value: !Ref SmartMovingApiKey

  # ===========================================================================
  # S3 — Frontend hosting + Pipeline artifacts
  # ===========================================================================
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub moving-crm-frontend-${Environment}-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # ===========================================================================
  # CLOUDFRONT — HTTPS for frontend
  # ===========================================================================
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub moving-crm-oac-${Environment}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # AWS WAF (prod) — managed rules + per-IP login rate limit. CLOUDFRONT scope.
  WebAcl:
    Type: AWS::WAFv2::WebACL
    Condition: IsProd
    Properties:
      Name: !Sub moving-crm-${Environment}
      Scope: CLOUDFRONT
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub moving-crm-${Environment}-webacl
      Rules:
        - Name: AWSManagedCommon
          Priority: 1
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: common
        - Name: AWSManagedIpReputation
          Priority: 2
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesAmazonIpReputationList
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: iprep
        - Name: LoginRateLimit
          Priority: 3
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: 100
              AggregateKeyType: IP
              ScopeDownStatement:
                ByteMatchStatement:
                  FieldToMatch:
                    UriPath: {}
                  PositionalConstraint: STARTS_WITH
                  SearchString: /api/auth/login
                  TextTransformations:
                    - Priority: 0
                      Type: NONE
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: loginratelimit

  # SPA routing — rewrite extensionless, non-API paths to /index.html (replaces the
  # global 403/404 error rewrite so real API error codes pass through unchanged).
  SpaRoutingFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub moving-crm-spa-${Environment}
      AutoPublish: true
      FunctionConfig:
        Comment: SPA routing for Moving CRM
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri;
          if (uri.startsWith('/api/')) { return request; }
          if (uri.includes('.')) { return request; }
          request.uri = '/index.html';
          return request;
        }

  # ACM cert for the custom domain (must be us-east-1 for CloudFront; DNS-validated).
  SiteCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: HasDomain
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub moving-crm-${Environment}
        DefaultRootObject: index.html
        Aliases: !If [HasDomain, [!Ref DomainName], !Ref "AWS::NoValue"]
        WebACLId: !If [IsProd, !GetAtt WebAcl.Arn, !Ref "AWS::NoValue"]
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
          - Id: ApiOrigin
            DomainName: !Sub "${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          # Managed CachingOptimized
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt SpaRoutingFunction.FunctionMetadata.FunctionARN
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            # Managed CachingDisabled + AllViewerExceptHostHeader (forwards Authorization)
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
        ViewerCertificate: !If
          - HasDomain
          - AcmCertificateArn: !Ref SiteCertificate
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true

  DomainRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false


  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub moving-crm-codebuild-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # CloudWatch Logs
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*"
              # Pipeline artifact bucket
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketLocation
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub "${ArtifactBucket.Arn}/*"
              # Frontend bucket (deploy built files + read Lambda zips for update-function-code)
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt FrontendBucket.Arn
                  - !Sub "${FrontendBucket.Arn}/*"
              # Old dispatch bucket cleanup before stack update
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !Sub "arn:aws:s3:::moving-crm-dispatch-${Environment}-${AWS::AccountId}"
              - Effect: Allow
                Action:
                  - s3:DeleteObject
                Resource: !Sub "arn:aws:s3:::moving-crm-dispatch-${Environment}-${AWS::AccountId}/*"
              # SSM (read DB config + write admin password)
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                  - ssm:PutParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/moving-crm/${Environment}/*"
              # DynamoDB (read leads for import)
              - Effect: Allow
                Action:
                  - dynamodb:Scan
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/leads"
              # Secrets Manager (RDS managed password)
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !GetAtt Database.MasterUserSecret.SecretArn
              # Lambda (update function code during deploy)
              - Effect: Allow
                Action:
                  - lambda:UpdateFunctionCode
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:moving-crm-*"
              # CloudFormation (read stack outputs during deploy)
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                Resource: !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/moving-crm-${Environment}/*"
              # CloudFront (cache invalidation during deploy)
              - Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                Resource: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/*"
              # VPC ENIs — DeployProject runs migrations inside the VPC in prod
              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DeleteNetworkInterface
                  - ec2:DescribeSubnets
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeVpcs
                  - ec2:DescribeDhcpOptions
                Resource: "*"
              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterfacePermission
                Resource: "*"

  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub moving-crm-pipeline-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipelinePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketLocation
                  - s3:GetBucketVersioning
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub "${ArtifactBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource:
                  - !GetAtt CodeBuildProject.Arn
                  - !GetAtt DeployProject.Arn
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: !Ref GitHubConnectionArn
              # CloudFormation (Infrastructure stage)
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:GetTemplate
                  - cloudformation:GetTemplateSummary
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:SetStackPolicy
                Resource: !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/moving-crm-${Environment}/*"
              # Pass execution role to CloudFormation
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt CloudFormationExecutionRole.Arn

  # ===========================================================================
  # IAM — CloudFormation execution role (for pipeline Infrastructure stage)
  # ===========================================================================
  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub moving-crm-cfn-exec-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudFormationExecution
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Networking (VPC, subnets, security groups, route tables)
              - Effect: Allow
                Action:
                  - ec2:*
                Resource: "*"
              # RDS
              - Effect: Allow
                Action:
                  - rds:*
                Resource: "*"
              # S3
              - Effect: Allow
                Action:
                  - s3:*
                Resource: "*"
              # SSM Parameters
              - Effect: Allow
                Action:
                  - ssm:PutParameter
                  - ssm:DeleteParameter
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:AddTagsToResource
                  - ssm:RemoveTagsFromResource
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/moving-crm/*"
              # IAM roles (scoped to project prefix)
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PassRole
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:GetRolePolicy
                  - iam:UpdateAssumeRolePolicy
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/moving-crm-*"
              # CodeBuild
              - Effect: Allow
                Action:
                  - codebuild:*
                Resource: !Sub "arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/moving-crm-*"
              # CodePipeline
              - Effect: Allow
                Action:
                  - codepipeline:*
                Resource: !Sub "arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:moving-crm-*"
              # Lambda functions
              - Effect: Allow
                Action:
                  - lambda:*
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:moving-crm-*"
              # Lambda event source mappings (ARN is event-source-mapping:<uuid>, not scoped to function name)
              - Effect: Allow
                Action:
                  - lambda:CreateEventSourceMapping
                  - lambda:UpdateEventSourceMapping
                  - lambda:DeleteEventSourceMapping
                  - lambda:GetEventSourceMapping
                  - lambda:ListEventSourceMappings
                Resource: "*"
              # EventBridge
              - Effect: Allow
                Action:
                  - events:*
                Resource: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/moving-crm-*"
              # EventBridge Scheduler
              - Effect: Allow
                Action:
                  - scheduler:*
                Resource: "*"
              # API Gateway
              - Effect: Allow
                Action:
                  - apigateway:*
                  - execute-api:*
                Resource:
                  - "*"
                  - !Sub "arn:aws:apigateway:${AWS::Region}::/apis"
                  - !Sub "arn:aws:apigateway:${AWS::Region}::/apis/*"
              # SQS (lead duplicate queues)
              - Effect: Allow
                Action:
                  - sqs:*
                Resource: "*"
              # Secrets Manager (RDS managed passwords)
              - Effect: Allow
                Action:
                  - secretsmanager:*
                Resource: "*"
              # CloudFront
              - Effect: Allow
                Action:
                  - cloudfront:*
                Resource: "*"
              # CloudWatch Logs
              - Effect: Allow
                Action:
                  - logs:*
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
              # CodeStar Connections (for pipeline source action)
              - Effect: Allow
                Action:
                  - codestar-connections:PassConnection
                Resource: "*"
              # WAF (prod Web ACL)
              - Effect: Allow
                Action:
                  - wafv2:*
                Resource: "*"
              # ACM + Route 53 (custom-domain cert + DNS records)
              - Effect: Allow
                Action:
                  - acm:*
                  - route53:*
                Resource: "*"

  # ===========================================================================
  # S3 — Pipeline artifacts
  # ===========================================================================
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub moving-crm-artifacts-${Environment}-${AWS::AccountId}
      LifecycleConfiguration:
        Rules:
          - Id: CleanupOldArtifacts
            Status: Enabled
            ExpirationInDays: 30

  # ===========================================================================
  # CODEBUILD — Build project
  # ===========================================================================
  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub moving-crm-${Environment}
      Description: Build + deploy Moving CRM
      ServiceRole: !GetAtt CodeBuildRole.Arn
      TimeoutInMinutes: 15
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec.yml
      Artifacts:
        Type: CODEPIPELINE
      Cache:
        Type: LOCAL
        Modes:
          - LOCAL_CUSTOM_CACHE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: SSM_PREFIX
            Value: !Sub /moving-crm/${Environment}/
          - Name: AWS_REGION
            Value: !Ref AWS::Region
          - Name: FRONTEND_BUCKET
            Value: !Ref FrontendBucket
          - Name: DYNAMO_TABLE_NAME
            Value: leads

  # ===========================================================================
  # CODEPIPELINE V2 — Source → Build → Infrastructure → Deploy
  # ===========================================================================
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub moving-crm-${Environment}
      PipelineType: V2
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Triggers:
        - ProviderType: CodeStarSourceConnection
          GitConfiguration:
            SourceActionName: GitHub
            Push:
              - Branches:
                  Includes:
                    - main
      Stages:
        # --- Source: pull from GitHub on merge to main ---
        - Name: Source
          Actions:
            - Name: GitHub
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: "1"
              Configuration:
                ConnectionArn: !Ref GitHubConnectionArn
                FullRepositoryId: !Ref GitHubRepo
                BranchName: !Ref GitHubBranch
                DetectChanges: false
              OutputArtifacts:
                - Name: SourceCode

        # --- Infrastructure: deploy CloudFormation template (self-mutating) ---
        # --- Build: compile frontend, package Lambdas ---
        - Name: Build
          Actions:
            - Name: Build
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref CodeBuildProject
              InputArtifacts:
                - Name: SourceCode
              OutputArtifacts:
                - Name: BuildOutput

        # --- Infrastructure: deploy CloudFormation template (self-mutating) ---
        - Name: Infrastructure
          Actions:
            - Name: DeployInfra
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: "1"
              Configuration:
                ActionMode: CREATE_UPDATE
                StackName: !Sub moving-crm-${Environment}
                TemplatePath: SourceCode::infra/template.yaml
                Capabilities: CAPABILITY_NAMED_IAM
                RoleArn: !GetAtt CloudFormationExecutionRole.Arn
                ParameterOverrides: !Sub |
                  {
                    "Environment": "${Environment}",
                    "GitHubConnectionArn": "${GitHubConnectionArn}",
                    "GitHubRepo": "${GitHubRepo}",
                    "GitHubBranch": "${GitHubBranch}",
                    "AllowedCIDR": "${AllowedCIDR}",
                    "SmartMovingApiKey": "${SmartMovingApiKey}",
                    "DomainName": "${DomainName}",
                    "HostedZoneId": "${HostedZoneId}",
                    "DeployLambda": "true"
                  }
              InputArtifacts:
                - Name: SourceCode

        # --- Deploy: frontend to S3, update Lambda code, run migrations ---
        - Name: Deploy
          Actions:
            - Name: DeployToProduction
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref DeployProject
              InputArtifacts:
                - Name: BuildOutput

  # ===========================================================================
  # CODEBUILD — Deploy project (runs after build succeeds)
  # ===========================================================================
  DeployProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub moving-crm-deploy-${Environment}
      Description: Deploy Moving CRM to production
      ServiceRole: !GetAtt CodeBuildRole.Arn
      VpcConfig: !If
        - IsProd
        - VpcId: !Ref VPC
          Subnets: [!Ref PrivateSubnetA, !Ref PrivateSubnetB]
          SecurityGroupIds: [!Ref LambdaSecurityGroup]
        - !Ref "AWS::NoValue"
      TimeoutInMinutes: 10
      Source:
        Type: CODEPIPELINE
        BuildSpec: deployspec.yml
      Artifacts:
        Type: CODEPIPELINE
      Cache:
        Type: LOCAL
        Modes:
          - LOCAL_CUSTOM_CACHE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        EnvironmentVariables:
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: SSM_PREFIX
            Value: !Sub /moving-crm/${Environment}/
          - Name: AWS_REGION
            Value: !Ref AWS::Region
          - Name: FRONTEND_BUCKET
            Value: !Ref FrontendBucket
          - Name: DYNAMO_TABLE_NAME
            Value: leads
          - Name: DB_PASSWORD
            Type: SECRETS_MANAGER
            Value: !Sub
              - "${SecretArn}:password::"
              - SecretArn: !GetAtt Database.MasterUserSecret.SecretArn

  # ===========================================================================
  # API BACKEND LAMBDA + API GATEWAY
  # ===========================================================================
  ApiLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub moving-crm-api-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: ApiLambdaPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/moving-crm/${Environment}/*"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/meta-webhook/*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !GetAtt Database.MasterUserSecret.SecretArn
              - Effect: Allow
                Action:
                  - dynamodb:Scan
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:PutItem
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/leads"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/conversations"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/sms_messages"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/cache"
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt LeadDuplicateQueue.Arn
              # EventBridge Scheduler — create one-time delayed schedules for lead duplication
              - Effect: Allow
                Action:
                  - scheduler:CreateSchedule
                  - scheduler:GetSchedule
                  - scheduler:DeleteSchedule
                Resource: !Sub "arn:aws:scheduler:${AWS::Region}:${AWS::AccountId}:schedule/default/lead-dup-*"
              # Allow passing the scheduler role to EventBridge Scheduler
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt LeadDuplicateSchedulerRole.Arn
                Condition:
                  StringEquals:
                    iam:PassedToService: scheduler.amazonaws.com

  JwtSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub moving-crm-jwt-secret-${Environment}
      Description: JWT signing key for the Moving CRM API (generated, never committed)
      GenerateSecretString:
        PasswordLength: 48
        ExcludePunctuation: true

  ApiLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub moving-crm-api-${Environment}
      Runtime: python3.11
      Handler: lambda_handler.handler
      Timeout: 30
      MemorySize: 512
      Role: !GetAtt ApiLambdaRole.Arn
      VpcConfig: !If
        - IsProd
        - SecurityGroupIds: [!Ref LambdaSecurityGroup]
          SubnetIds: [!Ref PrivateSubnetA, !Ref PrivateSubnetB]
        - !Ref "AWS::NoValue"
      # Real code comes from S3 once the pipeline has built+uploaded it. During the
      # initial bootstrap (DeployLambda=false) the zip does not exist yet, so use a
      # tiny inline placeholder; the pipeline replaces it on the first run.
      Code: !If
        - ShouldDeployLambda
        - S3Bucket: !Ref FrontendBucket
          S3Key: api-backend/package.zip
        - ZipFile: |
            def handler(event, context):
                return {"statusCode": 503, "body": "bootstrapping"}
      Environment:
        Variables:
          SSM_PREFIX: !Sub /moving-crm/${Environment}/
          AWS_REGION_NAME: !Ref AWS::Region
          DB_SECRET_ARN: !GetAtt Database.MasterUserSecret.SecretArn
          SMARTMOVING_API_KEY: !Ref SmartMovingApiKey
          JWT_SECRET: !Sub "{{resolve:secretsmanager:${JwtSecret}:SecretString}}"
          CORS_ORIGINS: !If
            - IsProd
            - !If [HasDomain, !Sub "https://${DomainName}", !Sub "https://${CloudFrontDistribution.DomainName}"]
            - !Join
              - ","
              - - !Sub "https://${CloudFrontDistribution.DomainName}"
                - "http://localhost:5173"
          LEAD_DUPLICATE_QUEUE_URL: !GetAtt LeadDuplicateQueue.QueueUrl
          LEAD_DUPLICATE_FUNCTION_ARN: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:moving-crm-lead-duplicate-${Environment}"
          LEAD_DUPLICATE_SCHEDULER_ROLE_ARN: !GetAtt LeadDuplicateSchedulerRole.Arn

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    DependsOn: CloudFormationExecutionRole
    Properties:
      Name: !Sub moving-crm-api-${Environment}
      ProtocolType: HTTP

  HttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiLambdaFunction.Arn
      PayloadFormatVersion: "2.0"

  HttpApiDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "$default"
      Target: !Sub "integrations/${HttpApiIntegration}"

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true

  ApiLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ApiLambdaFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*"

  ApiLambdaSchedulerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ApiLambdaFunction.Arn
      Action: lambda:InvokeFunction
      Principal: scheduler.amazonaws.com
      SourceArn: !Sub "arn:aws:scheduler:${AWS::Region}:${AWS::AccountId}:schedule/default/moving-crm-auto-assign-${Environment}"

  # ===========================================================================
  # AUTO-ASSIGN BACKLOG SCHEDULER (every 15 min)
  # ===========================================================================
  AutoAssignSchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub moving-crm-auto-assign-scheduler-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt ApiLambdaFunction.Arn

  AutoAssignScheduler:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub moving-crm-auto-assign-${Environment}
      Description: Runs the backlog assignment engine every 15 minutes
      ScheduleExpression: !If [IsProd, "rate(15 minutes)", "rate(1 minute)"]
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !GetAtt ApiLambdaFunction.Arn
        RoleArn: !GetAtt AutoAssignSchedulerRole.Arn
        Input: !Sub '{"trigger":"auto_assign_backlog","schedule":"moving-crm-auto-assign-${Environment}"}'

  # ===========================================================================
  # LEAD FOLLOWUP LAMBDA
  # ===========================================================================
  LeadFollowupRole:
    Condition: ShouldDeployLambda
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub moving-crm-lead-followup-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: LeadFollowupPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/meta-webhook/*"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/moving-crm/${Environment}/*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !GetAtt Database.MasterUserSecret.SecretArn

  LeadFollowupFunction:
    Condition: ShouldDeployLambda
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub moving-crm-lead-followup-${Environment}
      Runtime: python3.11
      Handler: handler.handler
      Timeout: 300
      MemorySize: 256
      Role: !GetAtt LeadFollowupRole.Arn
      VpcConfig: !If
        - IsProd
        - SecurityGroupIds: [!Ref LambdaSecurityGroup]
          SubnetIds: [!Ref PrivateSubnetA, !Ref PrivateSubnetB]
        - !Ref "AWS::NoValue"
      Code:
        S3Bucket: !Ref FrontendBucket
        S3Key: lead-followup/package.zip
      Environment:
        Variables:
          SMARTMOVING_API_KEY: !Ref SmartMovingApiKey
          DB_SECRET_ARN: !GetAtt Database.MasterUserSecret.SecretArn
          DB_HOST: !GetAtt Database.Endpoint.Address
          DB_PORT: !GetAtt Database.Endpoint.Port
          DB_NAME: !Ref DBName
          DB_USER: !Ref DBMasterUsername
          GOOGLE_SHEET_ID: !Ref GoogleSheetId
          GOOGLE_DAY3_WORKSHEET_TITLE: Day3 Status 0

  LeadFollowupEventInvokeConfig:
    Condition: ShouldDeployLambda
    Type: AWS::Lambda::EventInvokeConfig
    Properties:
      FunctionName: !Ref LeadFollowupFunction
      MaximumRetryAttempts: 0
      Qualifier: $LATEST

  LeadFollowupSchedule:
    Condition: ShouldDeployLambda
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub moving-crm-lead-followup-sms-${Environment}
      Description: Day 2 & Day 3 SMS followups every morning at 8am ET (12:00 UTC)
      ScheduleExpression: "cron(0 12 * * ? *)"
      State: ENABLED
      Targets:
        - Id: LeadFollowupLambdaSms
          Arn: !GetAtt LeadFollowupFunction.Arn
          Input: '{"mode": "day_followup"}'
          RetryPolicy:
            MaximumRetryAttempts: 0

  LeadFollowupSchedulePermission:
    Condition: ShouldDeployLambda
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt LeadFollowupFunction.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt LeadFollowupSchedule.Arn

  LeadFollowupDueSchedule:
    Condition: ShouldDeployLambda
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub moving-crm-lead-followup-due-${Environment}
      Description: Due followup messages every morning at 8:15am ET (12:15 UTC)
      ScheduleExpression: "cron(15 12 * * ? *)"
      State: ENABLED
      Targets:
        - Id: LeadFollowupLambdaDue
          Arn: !GetAtt LeadFollowupFunction.Arn
          Input: '{"mode": "followup_messages"}'
          RetryPolicy:
            MaximumRetryAttempts: 0

  LeadFollowupDueSchedulePermission:
    Condition: ShouldDeployLambda
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt LeadFollowupFunction.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt LeadFollowupDueSchedule.Arn

  LeadFollowupDay3ExportSchedule:
    Condition: ShouldDeployLambda
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub moving-crm-lead-followup-day3-export-${Environment}
      Description: Daily day-3 status-0 lead export to Google Sheets (disabled — handled inside day_followup run)
      ScheduleExpression: "cron(0 12 * * ? *)"
      State: DISABLED
      Targets:
        - Id: LeadFollowupLambdaDay3Export
          Arn: !GetAtt LeadFollowupFunction.Arn
          Input: '{"mode": "day3_export_daily"}'
          RetryPolicy:
            MaximumRetryAttempts: 0

  LeadFollowupDay3ExportSchedulePermission:
    Condition: ShouldDeployLambda
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt LeadFollowupFunction.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt LeadFollowupDay3ExportSchedule.Arn

  # ===========================================================================
  # LEAD DUPLICATE — EventBridge Scheduler role (delayed one-time invocations)
  # ===========================================================================
  LeadDuplicateSchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub moving-crm-lead-duplicate-scheduler-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLeadDuplicate
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:moving-crm-lead-duplicate-${Environment}"

  LeadDuplicateSchedulerLambdaPermission:
    Condition: ShouldDeployLambda
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt LeadDuplicateFunction.Arn
      Action: lambda:InvokeFunction
      Principal: scheduler.amazonaws.com
      SourceArn: !Sub "arn:aws:scheduler:${AWS::Region}:${AWS::AccountId}:schedule/default/lead-dup-*"

  # ===========================================================================
  # LEAD DUPLICATE — SQS queues
  # ===========================================================================
  LeadDuplicateDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub moving-crm-lead-duplicate-dlq-${Environment}
      MessageRetentionPeriod: 1209600  # 14 days

  LeadDuplicateQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub moving-crm-lead-duplicate-${Environment}
      VisibilityTimeout: 180
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt LeadDuplicateDLQ.Arn
        maxReceiveCount: 1

  # ===========================================================================
  # LEAD DUPLICATE — Lambda
  # ===========================================================================
  LeadDuplicateRole:
    Condition: ShouldDeployLambda
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub moving-crm-lead-duplicate-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LeadDuplicatePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/moving-crm/${Environment}/*"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/meta-webhook/*"
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource:
                  - !GetAtt LeadDuplicateQueue.Arn
                  - !GetAtt LeadDuplicateDLQ.Arn

  LeadDuplicateFunction:
    Condition: ShouldDeployLambda
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub moving-crm-lead-duplicate-${Environment}
      Runtime: python3.11
      Handler: handler.handler
      Timeout: 30
      MemorySize: 256
      Role: !GetAtt LeadDuplicateRole.Arn
      Code:
        S3Bucket: !Ref FrontendBucket
        S3Key: lead-duplicate/package.zip
      Environment:
        Variables:
          SSM_PREFIX: !Sub /moving-crm/${Environment}/
          API_URL: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
          MOVING_CRM_ADMIN_PASSWORD_PARAM: /meta-webhook/MOVINGCRM_ADMIN_PASSWORD

  LeadDuplicateEventInvokeConfig:
    Condition: ShouldDeployLambda
    Type: AWS::Lambda::EventInvokeConfig
    Properties:
      FunctionName: !Ref LeadDuplicateFunction
      MaximumRetryAttempts: 0
      Qualifier: $LATEST

  LeadDuplicateEventSourceMapping:
    Condition: ShouldDeployLambda
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt LeadDuplicateQueue.Arn
      FunctionName: !GetAtt LeadDuplicateFunction.Arn
      BatchSize: 1
      FunctionResponseTypes:
        - ReportBatchItemFailures

  # ===========================================================================
  # OBSERVABILITY (prod) — SNS topic + core alarms (subscribe your email post-deploy)
  # ===========================================================================
  AlarmTopic:
    Type: AWS::SNS::Topic
    Condition: IsProd
    Properties:
      TopicName: !Sub moving-crm-alarms-${Environment}

  RDSCpuAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProd
    Properties:
      AlarmName: !Sub moving-crm-${Environment}-rds-cpu
      AlarmDescription: RDS CPU > 85% for 15 minutes
      Namespace: AWS/RDS
      MetricName: CPUUtilization
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref Database
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 85
      ComparisonOperator: GreaterThanThreshold
      AlarmActions: [!Ref AlarmTopic]
      TreatMissingData: notBreaching

  RDSStorageAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProd
    Properties:
      AlarmName: !Sub moving-crm-${Environment}-rds-storage
      AlarmDescription: RDS free storage < 2 GB
      Namespace: AWS/RDS
      MetricName: FreeStorageSpace
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref Database
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 2147483648
      ComparisonOperator: LessThanThreshold
      AlarmActions: [!Ref AlarmTopic]
      TreatMissingData: notBreaching

  ApiLambdaErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProd
    Properties:
      AlarmName: !Sub moving-crm-${Environment}-api-errors
      AlarmDescription: API Lambda errors > 5 in 5 minutes
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiLambdaFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      AlarmActions: [!Ref AlarmTopic]
      TreatMissingData: notBreaching

  LeadDuplicateDLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProd
    Properties:
      AlarmName: !Sub moving-crm-${Environment}-dlq-depth
      AlarmDescription: Messages landed in the lead-duplicate dead-letter queue
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt LeadDuplicateDLQ.QueueName
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions: [!Ref AlarmTopic]
      TreatMissingData: notBreaching

Outputs:
  FrontendURL:
    Description: Frontend URL (CloudFront)
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"

  FrontendBucketName:
    Description: S3 bucket for frontend
    Value: !Ref FrontendBucket

  DBEndpoint:
    Description: RDS PostgreSQL endpoint
    Value: !GetAtt Database.Endpoint.Address

  DBPort:
    Description: RDS PostgreSQL port
    Value: !GetAtt Database.Endpoint.Port

  PipelineName:
    Description: CodePipeline name
    Value: !Ref Pipeline

  DBSecretArn:
    Description: Secrets Manager ARN for RDS password
    Value: !GetAtt Database.MasterUserSecret.SecretArn

  VPCId:
    Description: VPC ID
    Value: !Ref VPC

  LeadFollowupLambdaArn:
    Condition: ShouldDeployLambda
    Description: ARN of the lead followup Lambda
    Value: !GetAtt LeadFollowupFunction.Arn

  ApiURL:
    Description: API Gateway URL for the backend
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"

  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref CloudFrontDistribution

  CloudFrontURL:
    Description: HTTPS frontend URL
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
