AWSTemplateFormatVersion: "2010-09-09"
Description: Moving CRM — Full stack (VPC, RDS, S3, CodePipeline, CodeBuild)

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  DBInstanceClass:
    Type: String
    Default: db.t3.micro

  DBName:
    Type: String
    Default: moving_crm

  DBMasterUsername:
    Type: String
    Default: crm_admin
    NoEcho: true

  AllowedCIDR:
    Type: String
    Description: Your IP in CIDR notation (e.g. 1.2.3.4/32) for dev access
    Default: "0.0.0.0/0"

  GitHubConnectionArn:
    Type: String
    Description: ARN of the CodeStar Connection to GitHub (create in Console → Developer Tools → Connections)

  GitHubRepo:
    Type: String
    Default: nechama-she/moving-crm
    Description: GitHub owner/repo

  GitHubBranch:
    Type: String
    Default: main

  SmartMovingApiKey:
    Type: String
    Default: f27f1bc13efa41a491eb485eb660f737
    NoEcho: true
    Description: SmartMoving API key

  GoogleSheetId:
    Type: String
    Default: 1cftSB2c_kyjR0ADdxJ_2RrJbJv8XdnUQ73PgHeztr6s
    Description: Google Sheet ID for lead data

  DeployLambda:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Set to false for initial bootstrap (Lambda zip not yet in S3)

Conditions:
  ShouldDeployLambda: !Equals [!Ref DeployLambda, "true"]

Resources:
  # ===========================================================================
  # NETWORKING
  # ===========================================================================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub moving-crm-${Environment}

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub moving-crm-public-a-${Environment}

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub moving-crm-public-b-${Environment}

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  SubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  # ===========================================================================
  # SECURITY GROUPS
  # ===========================================================================
  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow PostgreSQL access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: !Ref AllowedCIDR
          Description: PostgreSQL from allowed IP

  # CodeBuild connects to RDS via public endpoint (no VPC config needed, saves NAT Gateway cost)

  # ===========================================================================
  # RDS POSTGRESQL
  # ===========================================================================
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Moving CRM subnets
      SubnetIds:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB

  Database:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub moving-crm-${Environment}
      Engine: postgres
      EngineVersion: "17.2"
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: 20
      StorageType: gp3
      DBName: !Ref DBName
      MasterUsername: !Ref DBMasterUsername
      ManageMasterUserPassword: true
      PubliclyAccessible: true
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt DBSecurityGroup.GroupId
      BackupRetentionPeriod: 7
      MultiAZ: false
      StorageEncrypted: true
      Tags:
        - Key: Name
          Value: !Sub moving-crm-${Environment}

  # ===========================================================================
  # SSM PARAMETERS — DB connection info for the app + CodeBuild
  # ===========================================================================
  SSMDBHost:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /moving-crm/${Environment}/DB_HOST
      Type: String
      Value: !GetAtt Database.Endpoint.Address

  SSMDBPort:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /moving-crm/${Environment}/DB_PORT
      Type: String
      Value: !GetAtt Database.Endpoint.Port

  SSMDBName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /moving-crm/${Environment}/DB_NAME
      Type: String
      Value: !Ref DBName

  SSMDBUser:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /moving-crm/${Environment}/DB_USER
      Type: String
      Value: !Ref DBMasterUsername

  SSMSmartMovingApiKey:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /moving-crm/${Environment}/SMARTMOVING_API_KEY
      Type: String
      Value: !Ref SmartMovingApiKey

  SSMGoogleSheetId:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /moving-crm/${Environment}/GOOGLE_SHEET_ID
      Type: String
      Value: !Ref GoogleSheetId

  # ===========================================================================
  # S3 — Frontend hosting + Pipeline artifacts
  # ===========================================================================
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub moving-crm-frontend-${Environment}-${AWS::AccountId}
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicRead
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"

  # ===========================================================================
  # IAM — CodeBuild + CodePipeline roles
  # ===========================================================================
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub moving-crm-codebuild-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # CloudWatch Logs
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*"
              # Pipeline artifact bucket
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketLocation
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub "${ArtifactBucket.Arn}/*"
              # Frontend bucket (deploy built files)
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt FrontendBucket.Arn
                  - !Sub "${FrontendBucket.Arn}/*"
              # SSM (read DB config)
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/moving-crm/${Environment}/*"
              # DynamoDB (read leads for import)
              - Effect: Allow
                Action:
                  - dynamodb:Scan
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/leads"
              # Secrets Manager (RDS managed password)
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !GetAtt Database.MasterUserSecret.SecretArn
              # Lambda (update function code during deploy)
              - Effect: Allow
                Action:
                  - lambda:UpdateFunctionCode
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:moving-crm-*"
              # CloudFormation (read stack outputs during deploy)
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                Resource: !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/moving-crm-${Environment}/*"

  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub moving-crm-pipeline-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipelinePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketLocation
                  - s3:GetBucketVersioning
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub "${ArtifactBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource:
                  - !GetAtt CodeBuildProject.Arn
                  - !GetAtt DeployProject.Arn
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: !Ref GitHubConnectionArn
              # CloudFormation (Infrastructure stage)
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:GetTemplate
                  - cloudformation:GetTemplateSummary
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:SetStackPolicy
                Resource: !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/moving-crm-${Environment}/*"
              # Pass execution role to CloudFormation
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt CloudFormationExecutionRole.Arn

  # ===========================================================================
  # IAM — CloudFormation execution role (for pipeline Infrastructure stage)
  # ===========================================================================
  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub moving-crm-cfn-exec-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudFormationExecution
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Networking (VPC, subnets, security groups, route tables)
              - Effect: Allow
                Action:
                  - ec2:*
                Resource: "*"
              # RDS
              - Effect: Allow
                Action:
                  - rds:*
                Resource: "*"
              # S3
              - Effect: Allow
                Action:
                  - s3:*
                Resource: "*"
              # SSM Parameters
              - Effect: Allow
                Action:
                  - ssm:PutParameter
                  - ssm:DeleteParameter
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:AddTagsToResource
                  - ssm:RemoveTagsFromResource
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/moving-crm/*"
              # IAM roles (scoped to project prefix)
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PassRole
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:GetRolePolicy
                  - iam:UpdateAssumeRolePolicy
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/moving-crm-*"
              # CodeBuild
              - Effect: Allow
                Action:
                  - codebuild:*
                Resource: !Sub "arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/moving-crm-*"
              # CodePipeline
              - Effect: Allow
                Action:
                  - codepipeline:*
                Resource: !Sub "arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:moving-crm-*"
              # Lambda
              - Effect: Allow
                Action:
                  - lambda:*
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:moving-crm-*"
              # EventBridge
              - Effect: Allow
                Action:
                  - events:*
                Resource: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/moving-crm-*"
              # API Gateway
              - Effect: Allow
                Action:
                  - apigateway:*
                  - apigatewayv2:*
                  - execute-api:*
                Resource:
                  - "*"
                  - !Sub "arn:aws:apigateway:${AWS::Region}::/apis"
                  - !Sub "arn:aws:apigateway:${AWS::Region}::/apis/*"
              # Secrets Manager (RDS managed passwords)
              - Effect: Allow
                Action:
                  - secretsmanager:*
                Resource: "*"
              # CloudWatch Logs
              - Effect: Allow
                Action:
                  - logs:*
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
              # CodeStar Connections (for pipeline source action)
              - Effect: Allow
                Action:
                  - codestar-connections:PassConnection
                Resource: "*"

  # ===========================================================================
  # S3 — Pipeline artifacts
  # ===========================================================================
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub moving-crm-artifacts-${Environment}-${AWS::AccountId}
      LifecycleConfiguration:
        Rules:
          - Id: CleanupOldArtifacts
            Status: Enabled
            ExpirationInDays: 30

  # ===========================================================================
  # CODEBUILD — Build project
  # ===========================================================================
  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub moving-crm-${Environment}
      Description: Build + deploy Moving CRM
      ServiceRole: !GetAtt CodeBuildRole.Arn
      TimeoutInMinutes: 15
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec.yml
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        EnvironmentVariables:
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: SSM_PREFIX
            Value: !Sub /moving-crm/${Environment}/
          - Name: AWS_REGION
            Value: !Ref AWS::Region
          - Name: FRONTEND_BUCKET
            Value: !Ref FrontendBucket
          - Name: DYNAMO_TABLE_NAME
            Value: leads

  # ===========================================================================
  # CODEPIPELINE V2 — Source → Build → Infrastructure → Deploy
  # ===========================================================================
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub moving-crm-${Environment}
      PipelineType: V2
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Triggers:
        - ProviderType: CodeStarSourceConnection
          GitConfiguration:
            SourceActionName: GitHub
            Push:
              - Branches:
                  Includes:
                    - main
      Stages:
        # --- Source: pull from GitHub on merge to main ---
        - Name: Source
          Actions:
            - Name: GitHub
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: "1"
              Configuration:
                ConnectionArn: !Ref GitHubConnectionArn
                FullRepositoryId: !Ref GitHubRepo
                BranchName: !Ref GitHubBranch
                DetectChanges: false
              OutputArtifacts:
                - Name: SourceCode

        # --- Build: compile frontend, package Lambda, upload Lambda zip ---
        - Name: Build
          Actions:
            - Name: Build
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref CodeBuildProject
              InputArtifacts:
                - Name: SourceCode
              OutputArtifacts:
                - Name: BuildOutput

        # --- Infrastructure: deploy CloudFormation template (self-mutating) ---
        - Name: Infrastructure
          Actions:
            - Name: DeployInfra
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: "1"
              Configuration:
                ActionMode: CREATE_UPDATE
                StackName: !Sub moving-crm-${Environment}
                TemplatePath: SourceCode::infra/template.yaml
                Capabilities: CAPABILITY_NAMED_IAM
                RoleArn: !GetAtt CloudFormationExecutionRole.Arn
                ParameterOverrides: !Sub |
                  {
                    "Environment": "${Environment}",
                    "GitHubConnectionArn": "${GitHubConnectionArn}",
                    "GitHubRepo": "${GitHubRepo}",
                    "GitHubBranch": "${GitHubBranch}",
                    "AllowedCIDR": "${AllowedCIDR}",
                    "SmartMovingApiKey": "${SmartMovingApiKey}",
                    "GoogleSheetId": "${GoogleSheetId}",
                    "DeployLambda": "true"
                  }
              InputArtifacts:
                - Name: SourceCode

        # --- Deploy: frontend to S3, update Lambda code, run migrations ---
        - Name: Deploy
          Actions:
            - Name: DeployToProduction
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref DeployProject
              InputArtifacts:
                - Name: BuildOutput

  # ===========================================================================
  # CODEBUILD — Deploy project (runs after build succeeds)
  # ===========================================================================
  DeployProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub moving-crm-deploy-${Environment}
      Description: Deploy Moving CRM to production
      ServiceRole: !GetAtt CodeBuildRole.Arn
      TimeoutInMinutes: 10
      Source:
        Type: CODEPIPELINE
        BuildSpec: deployspec.yml
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        EnvironmentVariables:
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: SSM_PREFIX
            Value: !Sub /moving-crm/${Environment}/
          - Name: AWS_REGION
            Value: !Ref AWS::Region
          - Name: FRONTEND_BUCKET
            Value: !Ref FrontendBucket
          - Name: DYNAMO_TABLE_NAME
            Value: leads
          - Name: DB_PASSWORD
            Type: SECRETS_MANAGER
            Value: !Sub
              - "${SecretArn}:password::"
              - SecretArn: !GetAtt Database.MasterUserSecret.SecretArn

  # ===========================================================================
  # API BACKEND LAMBDA + API GATEWAY
  # ===========================================================================
  ApiLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub moving-crm-api-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ApiLambdaPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/moving-crm/${Environment}/*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !GetAtt Database.MasterUserSecret.SecretArn
              - Effect: Allow
                Action:
                  - dynamodb:Scan
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/leads"

  ApiLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub moving-crm-api-${Environment}
      Runtime: python3.11
      Handler: lambda_handler.handler
      Timeout: 30
      MemorySize: 512
      Role: !GetAtt ApiLambdaRole.Arn
      Code:
        S3Bucket: !Ref FrontendBucket
        S3Key: api-backend/package.zip
      Environment:
        Variables:
          SSM_PREFIX: !Sub /moving-crm/${Environment}/
          AWS_REGION_NAME: !Ref AWS::Region
          CORS_ORIGINS: !Join
            - ","
            - - !GetAtt FrontendBucket.WebsiteURL
              - "http://localhost:5173"
          DB_PASSWORD: !Sub
            - "{{resolve:secretsmanager:${SecretArn}:SecretString:password}}"
            - SecretArn: !GetAtt Database.MasterUserSecret.SecretArn

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    DependsOn: CloudFormationExecutionRole
    Properties:
      Name: !Sub moving-crm-api-${Environment}
      ProtocolType: HTTP

  HttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiLambdaFunction.Arn
      PayloadFormatVersion: "2.0"

  HttpApiDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "$default"
      Target: !Sub "integrations/${HttpApiIntegration}"

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true

  ApiLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ApiLambdaFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*"

  # ===========================================================================
  # LEAD FOLLOWUP LAMBDA
  # ===========================================================================
  LeadFollowupRole:
    Condition: ShouldDeployLambda
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub moving-crm-lead-followup-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LeadFollowupPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:GetFunctionConfiguration
                Resource: "*"
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: "arn:aws:ssm:us-east-1:381492064416:parameter/meta-webhook/GOOGLE_SHEETS_CREDENTIALS"

  LeadFollowupFunction:
    Condition: ShouldDeployLambda
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub moving-crm-lead-followup-${Environment}
      Runtime: python3.11
      Handler: handler.handler
      Timeout: 300
      MemorySize: 256
      Role: !GetAtt LeadFollowupRole.Arn
      Code:
        S3Bucket: !Ref FrontendBucket
        S3Key: lead-followup/package.zip
      Environment:
        Variables:
          SMARTMOVING_API_KEY: !Ref SmartMovingApiKey
          GOOGLE_SHEET_ID: !Ref GoogleSheetId
          GOOGLE_CREDENTIALS_SSM: /meta-webhook/GOOGLE_SHEETS_CREDENTIALS

  LeadFollowupSchedule:
    Condition: ShouldDeployLambda
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub moving-crm-lead-followup-${Environment}
      Description: Follow up on new leads every morning at 8am ET (12:00 UTC)
      ScheduleExpression: "cron(0 12 * * ? *)"
      State: ENABLED
      Targets:
        - Id: LeadFollowupLambda
          Arn: !GetAtt LeadFollowupFunction.Arn
          Input: '{"days_back": 1}'

  LeadFollowupSchedulePermission:
    Condition: ShouldDeployLambda
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt LeadFollowupFunction.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt LeadFollowupSchedule.Arn

Outputs:
  FrontendURL:
    Description: Frontend website URL
    Value: !GetAtt FrontendBucket.WebsiteURL

  FrontendBucketName:
    Description: S3 bucket for frontend
    Value: !Ref FrontendBucket

  DBEndpoint:
    Description: RDS PostgreSQL endpoint
    Value: !GetAtt Database.Endpoint.Address

  DBPort:
    Description: RDS PostgreSQL port
    Value: !GetAtt Database.Endpoint.Port

  PipelineName:
    Description: CodePipeline name
    Value: !Ref Pipeline

  DBSecretArn:
    Description: Secrets Manager ARN for RDS password
    Value: !GetAtt Database.MasterUserSecret.SecretArn

  VPCId:
    Description: VPC ID
    Value: !Ref VPC

  LeadFollowupLambdaArn:
    Condition: ShouldDeployLambda
    Description: ARN of the lead followup Lambda
    Value: !GetAtt LeadFollowupFunction.Arn

  ApiURL:
    Description: API Gateway URL for the backend
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
