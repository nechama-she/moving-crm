version: 0.2

# BUILD STAGE — install, compile, test (no deploy)
phases:
  install:
    runtime-versions:
      python: 3.11
      nodejs: 20
    commands:
      - echo "Installing frontend dependencies"
      - cd $CODEBUILD_SRC_DIR/frontend && npm ci

  build:
    commands:
      - echo "Building frontend"
      - cd $CODEBUILD_SRC_DIR/frontend && npm run build

      - echo "Packaging lead-followup Lambda"
      - cd $CODEBUILD_SRC_DIR/lead-followup
      - "pip install --root-user-action=ignore -r requirements.txt -t ./package --platform manylinux2014_x86_64 --only-binary=:all: --python-version 3.11 --implementation cp"
      - rm -rf ./package/boto3* ./package/botocore* ./package/s3transfer* ./package/jmespath*
      - find ./package -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
      - find ./package -type d -name "tests" -exec rm -rf {} + 2>/dev/null || true
      - find ./package -name "*.c" -o -name "*.cpp" -o -name "*.h" -o -name "*.pyx" | xargs rm -f 2>/dev/null || true
      - rm -rf ./package/sqlalchemy/dialects/mssql ./package/sqlalchemy/dialects/mysql ./package/sqlalchemy/dialects/oracle ./package/sqlalchemy/dialects/sqlite
      - cp -r $CODEBUILD_SRC_DIR/libs ./package/libs
      - cp -r services handler.py config.py database.py ./package/
      - cd package && zip -qr9 ../package.zip . && cd ..
      - echo "lead-followup package size:" && du -h $CODEBUILD_SRC_DIR/lead-followup/package.zip

      - echo "Uploading Lambda package to S3"
      - aws s3 cp $CODEBUILD_SRC_DIR/lead-followup/package.zip s3://${FRONTEND_BUCKET}/lead-followup/package.zip

      - echo "Packaging API backend Lambda"
      - cd $CODEBUILD_SRC_DIR/backend
      - "pip install --root-user-action=ignore -r requirements.txt -t ./package --platform manylinux2014_x86_64 --only-binary=:all: --python-version 3.11 --implementation cp"
      - rm -rf ./package/boto3* ./package/botocore* ./package/s3transfer* ./package/jmespath*
      - find ./package -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
      - find ./package -type d -name "tests" -exec rm -rf {} + 2>/dev/null || true
      - find ./package -name "*.c" -o -name "*.cpp" -o -name "*.h" -o -name "*.pyx" | xargs rm -f 2>/dev/null || true
      - rm -rf ./package/sqlalchemy/dialects/mssql ./package/sqlalchemy/dialects/mysql ./package/sqlalchemy/dialects/oracle ./package/sqlalchemy/dialects/sqlite
      - cp *.py ./package/
      - cp -r routes ./package/
      - cp -r $CODEBUILD_SRC_DIR/libs ./package/libs
      - cd package && zip -qr9 ../api-package.zip . && cd ..
      - echo "api-backend package size:" && du -h $CODEBUILD_SRC_DIR/backend/api-package.zip

      - echo "Uploading API backend package to S3"
      - aws s3 cp $CODEBUILD_SRC_DIR/backend/api-package.zip s3://${FRONTEND_BUCKET}/api-backend/package.zip

artifacts:
  files:
    - "**/*"
  base-directory: .

cache:
  paths:
    - '/root/.npm/**/*'
    - '/root/.cache/pip/**/*'
