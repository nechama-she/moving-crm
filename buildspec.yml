version: 0.2

# BUILD STAGE — install, compile, test (no deploy)
phases:
  install:
    runtime-versions:
      python: 3.11
      nodejs: 20
    commands:
      - echo "Installing frontend dependencies"
      - cd $CODEBUILD_SRC_DIR/frontend && npm ci
      - echo "Installing dispatch-frontend dependencies"
      - cd $CODEBUILD_SRC_DIR/dispatch-frontend && npm ci

  build:
    commands:
      - echo "Building frontend"
      - cd $CODEBUILD_SRC_DIR/frontend && npm run build

      - echo "Building dispatch-frontend"
      - cd $CODEBUILD_SRC_DIR/dispatch-frontend && npm run build

      - echo "Packaging lead-followup Lambda"
      - cd $CODEBUILD_SRC_DIR/lead-followup
      - "pip install --root-user-action=ignore -r requirements.txt -t ./package --platform manylinux2014_x86_64 --only-binary=:all: --python-version 3.11 --implementation cp"
      - rm -rf ./package/boto3* ./package/botocore* ./package/s3transfer* ./package/jmespath* ./package/sqlalchemy/dialects/mssql ./package/sqlalchemy/dialects/mysql ./package/sqlalchemy/dialects/oracle ./package/sqlalchemy/dialects/sqlite
      - find ./package \( -type d \( -name __pycache__ -o -name tests \) -exec rm -rf {} + \) -o \( -name '*.c' -o -name '*.cpp' -o -name '*.h' -o -name '*.pyx' \) -delete 2>/dev/null || true
      - cp -r $CODEBUILD_SRC_DIR/libs ./package/libs
      - cp -r services handler.py config.py database.py ./package/
      - cd package && zip -qr9 ../package.zip . && cd ..
      - echo "lead-followup package size:" && du -h $CODEBUILD_SRC_DIR/lead-followup/package.zip

      - echo "Uploading Lambda package to S3"
      - aws s3 cp $CODEBUILD_SRC_DIR/lead-followup/package.zip s3://${FRONTEND_BUCKET}/lead-followup/package.zip

      - echo "Packaging lead-duplicate Lambda"
      - cd $CODEBUILD_SRC_DIR/lead-duplicate
      - "pip install --root-user-action=ignore -r requirements.txt -t ./package --platform manylinux2014_x86_64 --only-binary=:all: --python-version 3.11 --implementation cp"
      - rm -rf ./package/boto3* ./package/botocore* ./package/s3transfer* ./package/jmespath* ./package/sqlalchemy/dialects/mssql ./package/sqlalchemy/dialects/mysql ./package/sqlalchemy/dialects/oracle ./package/sqlalchemy/dialects/sqlite
      - find ./package \( -type d \( -name __pycache__ -o -name tests \) -exec rm -rf {} + \) -o \( -name '*.c' -o -name '*.cpp' -o -name '*.h' -o -name '*.pyx' \) -delete 2>/dev/null || true
      - cp handler.py ./package/
      - cd package && zip -qr9 ../package.zip . && cd ..
      - echo "lead-duplicate package size:" && du -h $CODEBUILD_SRC_DIR/lead-duplicate/package.zip

      - echo "Uploading lead-duplicate package to S3"
      - aws s3 cp $CODEBUILD_SRC_DIR/lead-duplicate/package.zip s3://${FRONTEND_BUCKET}/lead-duplicate/package.zip

      - echo "Packaging API backend Lambda"
      - cd $CODEBUILD_SRC_DIR/backend
      - "pip install --root-user-action=ignore -r requirements.txt -t ./package --platform manylinux2014_x86_64 --only-binary=:all: --python-version 3.11 --implementation cp"
      - rm -rf ./package/boto3* ./package/botocore* ./package/s3transfer* ./package/jmespath* ./package/sqlalchemy/dialects/mssql ./package/sqlalchemy/dialects/mysql ./package/sqlalchemy/dialects/oracle ./package/sqlalchemy/dialects/sqlite
      - find ./package \( -type d \( -name __pycache__ -o -name tests \) -exec rm -rf {} + \) -o \( -name '*.c' -o -name '*.cpp' -o -name '*.h' -o -name '*.pyx' \) -delete 2>/dev/null || true
      - cp *.py ./package/
      - cp -r routes ./package/
      - cp -r $CODEBUILD_SRC_DIR/libs ./package/libs
      - cd package && zip -qr9 ../api-package.zip . && cd ..
      - echo "api-backend package size:" && du -h $CODEBUILD_SRC_DIR/backend/api-package.zip

      - echo "Uploading API backend package to S3"
      - aws s3 cp $CODEBUILD_SRC_DIR/backend/api-package.zip s3://${FRONTEND_BUCKET}/api-backend/package.zip

      - echo "Building dispatch-backend Docker image"
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_REPO="moving-crm-dispatch-${ENVIRONMENT:-dev}"
      - ECR_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}"
      - |
        if docker info >/dev/null 2>&1; then
          aws ecr describe-repositories --repository-names "$ECR_REPO" >/dev/null 2>&1 || aws ecr create-repository --repository-name "$ECR_REPO" --image-scanning-configuration scanOnPush=true
          aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
          cd $CODEBUILD_SRC_DIR/dispatch-backend && docker build -t ${ECR_URI}:latest .
          docker push ${ECR_URI}:latest
        else
          echo "Docker not available (Privileged Mode not yet enabled on this CodeBuild project). Skipping dispatch-backend image build — Infrastructure stage will enable it."
        fi

artifacts:
  files:
    - "**/*"
  base-directory: .

cache:
  paths:
    - '/root/.npm/**/*'
    - '/root/.cache/pip/**/*'
