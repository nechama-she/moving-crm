version: 0.2

# BUILD STAGE — install, compile, test (no deploy)
phases:
  install:
    runtime-versions:
      python: 3.11
      nodejs: 20
    commands:
      - echo "Installing backend dependencies"
      - cd $CODEBUILD_SRC_DIR/backend && pip install -r requirements.txt
      - echo "Installing frontend dependencies"
      - cd $CODEBUILD_SRC_DIR/frontend && npm ci

  build:
    commands:
      - echo "Building frontend"
      - cd $CODEBUILD_SRC_DIR/frontend && npm run build

      - echo "Packaging lead-followup Lambda"
      - cd $CODEBUILD_SRC_DIR/lead-followup
      - "pip install -r requirements.txt -t ./package --platform manylinux2014_x86_64 --only-binary=:all: --python-version 3.11 --implementation cp"
      - cp -r libs services handler.py config.py ./package/
      - cp google-credentials.json ./package/ 2>/dev/null || true
      - cd package && zip -r9 ../package.zip . && cd ..

      - echo "Uploading Lambda package to S3"
      - aws s3 cp $CODEBUILD_SRC_DIR/lead-followup/package.zip s3://${FRONTEND_BUCKET}/lead-followup/package.zip

artifacts:
  files:
    - "**/*"
  base-directory: .
