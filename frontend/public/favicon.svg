<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">movingCRM favicon</title>
  <desc id="desc">Professional moving CRM app icon with a stylized moving truck and motion swoosh.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4f7fb"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c2a57"/>
      <stop offset="1" stop-color="#0a7ee8"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071f45"/>
      <stop offset="1" stop-color="#0d376f"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0a1e3a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="88" fill="url(#bg)"/>
  <rect x="24" y="24" width="464" height="464" rx="88" fill="none" stroke="#e8edf4" stroke-width="2"/>

  <g filter="url(#softShadow)">
    <!-- outer motion arc -->
    <path d="M152 162C204 88 323 75 398 142c39 35 59 85 55 138h-28c1-45-18-88-52-117-64-55-164-46-209 17z" fill="url(#blue)"/>

    <!-- road swooshes -->
    <path d="M108 356c76-46 176-69 296-62-83 9-158 34-225 82z" fill="url(#navy)"/>
    <path d="M205 387c59-45 130-72 217-82-47 32-95 68-139 108z" fill="url(#blue)"/>

    <!-- speed lines -->
    <path d="M74 222h113l-22 19H74z" fill="#0a7ee8"/>
    <path d="M88 265h83l-18 18H88z" fill="#0c2a57" opacity=".9"/>
    <path d="M66 307h118l-24 18H66z" fill="#0a7ee8" opacity=".85"/>

    <!-- truck body -->
    <path d="M160 201h142c11 0 20 9 20 20v94H160z" fill="#081f45"/>
    <path d="M179 221h103v71H179z" fill="#ffffff" opacity=".98"/>
    <path d="M322 235h48c13 0 25 7 32 18l25 43v19H322z" fill="#081f45"/>
    <path d="M341 252h31c7 0 13 4 17 10l15 25h-63z" fill="#ffffff" opacity=".96"/>
    <path d="M410 300h29v15h-29z" fill="#ffffff" opacity=".96"/>

    <!-- truck base and wheels -->
    <path d="M145 315h294v21H145z" fill="#081f45"/>
    <circle cx="212" cy="337" r="32" fill="#081f45"/>
    <circle cx="212" cy="337" r="17" fill="#ffffff"/>
    <circle cx="356" cy="337" r="32" fill="#081f45"/>
    <circle cx="356" cy="337" r="17" fill="#ffffff"/>
  </g>
</svg>
